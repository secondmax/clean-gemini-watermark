<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Clean Gemini Watermark</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://cleangemini.online">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #050506;
    color: #f4f4f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { text-align: center; padding: 2rem; }
  .code { font-size: 6rem; font-weight: 800; background: linear-gradient(135deg, #7c3aed, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .title { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
  .desc { color: #a1a1aa; margin-bottom: 2rem; }
  .btn {
    display: inline-block; padding: 0.75rem 2rem;
    background: linear-gradient(135deg, #7c3aed, #9333ea);
    color: #fff; text-decoration: none; border-radius: 12px;
    font-weight: 600; transition: opacity 200ms;
  }
  .btn:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <div class="title">Page Not Found</div>
  <div class="desc">The page you're looking for doesn't exist or has been moved.</div>
  <a class="btn" href="/">Go Home →</a>
</div>
</body>
</html>
